[project]
name = "embedding-atlas"
version = "0.20.0"
license = "MIT"
description = "A tool for visualizing embeddings"
keywords = ["embedding", "visualization"]
readme = "README.md"
authors = [
  {name = "Donghao Ren", email = "donghao.ren@gmail.com"},
  {name = "Halden Lin", email = "halden.lin@gmail.com"},
  {name = "Fred Hohman", email = "fredhohman@apple.com"},
  {name = "Dominik Moritz", email = "domoritz@gmail.com"},
]
requires-python = ">=3.11"
dependencies = [
  "click >= 7.0.0",
  "pandas >= 2.2.0",
  "fastparquet >= 2024.0.0",
  "platformdirs >= 4.3.0",
  "umap-learn >= 0.5.0",
  "sentence-transformers >= 3.3.0",
  "fastapi >= 0.115.0",
  "uvicorn >= 0.32.0",
  'uvloop >= 0.21.0 ; platform_system != "Windows"',
  "pyarrow >= 18.0.0",
  "duckdb >= 1.4.0",
  "inquirer >= 3.0.0",
  "llvmlite >= 0.43.0",
  "accelerate >= 1.5.0",
  "tqdm >= 4.60.0",
  "litellm >= 1.70.0, != 1.82.7, != 1.82.8", # Critical supply chain attack: https://futuresearch.ai/blog/litellm-pypi-supply-chain-attack/
  "websockets >= 15.0.1",
  "cryptography >= 35.0.0",
  "narwhals >= 2.0.0",
]

[project.scripts]
embedding-atlas = "embedding_atlas.cli:main"

[project.urls]
homepage = "https://apple.github.io/embedding-atlas"
source = "https://github.com/apple/embedding-atlas"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
artifacts = [
  "embedding_atlas/static",
  "embedding_atlas/widget_static"
]

[tool.hatch.build.targets.wheel]
packages = ["embedding_atlas"]

[tool.pytest.ini_options]
markers = [
  "external: tests requiring external resources such as models or APIs (skipped unless --run-external is passed)",
]

[dependency-groups]
dev = [
  "datasets >= 3.1.0",
  "jupyterlab >= 4.3.0",
  "streamlit >= 1.43.0",
  "anywidget >= 0.9.0",
  "docutils >= 0.22.0",
  "pytest >= 9.0.2",
  "pytest-asyncio>=1.3.0",
  "pyright >= 1.1.0",
  "soundfile >= 0.12.0",
  "polars >= 1.0.0",
  "marimo >= 0.20.0",
  "gymnasium >= 1.0.0",
  "stable-baselines3 >= 2.4.0",
  "matplotlib >= 3.9.0",
]
